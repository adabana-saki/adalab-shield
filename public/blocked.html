<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>adalab shield</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica,
          Arial, sans-serif;
        background: linear-gradient(
          135deg,
          #f8fafc 0%,
          #e2e8f0 50%,
          #cbd5e1 100%
        );
        color: #1e293b;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(
            135deg,
            #1a1a2e 0%,
            #16213e 50%,
            #0f3460 100%
          );
          color: #ffffff;
        }
        .muted {
          color: rgba(255, 255, 255, 0.6) !important;
        }
        .adalab {
          background: rgba(6, 182, 212, 0.12) !important;
        }
      }
      .wrap {
        text-align: center;
        max-width: 460px;
        padding: 40px;
      }
      .icon {
        font-size: 72px;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 28px;
        margin: 0 0 12px;
      }
      p.msg {
        font-size: 18px;
        margin: 0 0 24px;
        opacity: 0.75;
        line-height: 1.5;
      }
      .muted {
        font-size: 13px;
        color: rgba(30, 41, 59, 0.5);
        margin-top: 24px;
      }
      .adalab {
        display: none;
        margin-top: 20px;
        padding: 14px 20px;
        border-radius: 12px;
        background: rgba(6, 182, 212, 0.08);
        border: 1px solid rgba(6, 182, 212, 0.35);
      }
      .adalab .label {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.65;
        margin-bottom: 4px;
      }
      .adalab .time {
        font-size: 30px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .adalab .task {
        font-size: 13px;
        opacity: 0.7;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="icon">🛡️</div>
      <h1 id="title">Content Blocked</h1>
      <p class="msg" id="message"></p>
      <div class="adalab" id="adalab">
        <div class="label" id="adalab-label"></div>
        <div class="time" id="adalab-time">--:--</div>
        <div class="task" id="adalab-task"></div>
      </div>
      <p class="muted" id="hint"></p>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
